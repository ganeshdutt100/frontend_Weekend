<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>

<body>
    <form action="">
        <input type="text" required>
        <br> <br>
        <input type="text" value="Aseel">
        <br> <br>
        <input type="text" placeholder="Aseel">
        <br> <br>
        <input type="text" value="Aseel" readonly>
        <br> <br>
        <input type="text" maxlength="5">
        <br> <br>
        <input type="number" min="3" max="8">
        <br> <br>
        <input type="number" step="3">
        <br> <br>

        <select>
            <option>India</option>
            <option>USA</option>
        </select>
        <input type="submit">
    </form>
</body>

</html>
