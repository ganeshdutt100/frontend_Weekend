<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>navbar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        nav {
            display: flex;
            justify-content: space-around;
            background-color: black;
            color: white;
            padding: 20px;
            margin: 20px;
            border-radius: 40px;

        }

        ul {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .heroSection {
            display: flex;
            gap: 30px;
            margin: 20px;
            align-items: center;
        }

        .text {}

        .image img {
            width: 300px;
            height: auto;
        }

        button {
            color: white;
            background-color: black;
            padding: 10px 20px;
            border-radius: 20px;
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">Logo</div>
        <ul>
            <li>Home</li>
            <li>About</li>
            <li>Contact</li>
            <li>Project</li>
        </ul>
    </nav>

    <!-- heroSection -->
    <div class="heroSection">
        <div class="text">
            <h1>Lorem ipsum dolor sit amet.</h1>
            <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Recusandae deserunt beatae dolores non
                nobis.
                Commodi doloribus, nemo culpa saepe quae facilis quidem aliquam nam sunt, ipsum ipsam vitae ea.
                Accusantium.</p>
            <button>Click me </button>
        </div>
        <div class="image">
            <img src="https://4achievers.com/2026_images/images/banner-learning.png" alt="">
        </div>
    </div>
</body>

</html>
